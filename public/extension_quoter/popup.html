<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; width: 300px; padding: 15px; margin: 0; background: #f8fafc; }
      h2 { font-size: 16px; margin-top: 0; color: #0f172a; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 5px; }
      p { font-size: 13px; color: #475569; margin-bottom: 15px; }
      textarea { width: 100%; height: 100px; padding: 8px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 11px; margin-bottom: 15px; resize: none; }
      button { display: block; width: 100%; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; font-size: 13px; font-weight: 800; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
      #fill-btn { background: #000000; color: white; margin-bottom: 10px; }
      #fill-btn:hover { background: #333333; }
      #status { display: none; margin-top: 10px; padding: 10px; border-radius: 4px; font-size: 12px; font-weight: bold; text-align: center; }
      .success { background: #dcfce7; color: #166534; border: 1px solid #16a34a; }
      .error { background: #fee2e2; color: #991b1b; border: 1px solid #dc2626; }
    </style>
  </head>
  <body>
    <h2>Quoter Connect</h2>
    <p>1. Pulsa "Copiar Datos para Extensión" en el PDD de Quoter.<br>2. Pega el contenido abajo.<br>3. Pulsa Releyar CaixaBank.</p>
    <textarea id="pdd-data" placeholder="Pega el PDD JSON aquí..."></textarea>
    <button id="fill-btn">Autocompletar Formulario</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
