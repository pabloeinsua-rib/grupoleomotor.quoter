    <style>
      /* GOOGLE TRANSLATE BANNER KILLER - ABSOLUTE OVERRIDES */
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      .VIpgJd-ZVi9od-ORHb-OEVmcd,
      .goog-te-gadget-icon, 
      .goog-tooltip, 
      .goog-tooltip:hover {
          display: none !important;
          visibility: hidden !important;
          opacity: 0 !important;
      }
      body {
          top: 0px !important; 
          margin-top: 0px !important;
          position: static !important;
          min-height: 100vh !important;
      }
      html {
          top: 0 !important;
          margin-top: 0 !important;
      }
      /* Hide standard tooltips */
      .goog-text-highlight {
          background-color: transparent !important;
          border: none !important; 
          box-shadow: none !important;
      }

      /* PREMIUM GLASS EFFECT STYLES */
      html, body {
        overflow-x: hidden;
        width: 100%;
        height: 100%;
        background-color: #f8fafc;
        font-family: "Segoe UI", sans-serif !important;
      }

      .glass-btn, .glass-btn-secondary {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
      }
      .glass-btn:hover {
        background: rgba(255, 255, 255, 0.6);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
      }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(12px) saturate(180%);
        -webkit-backdrop-filter: blur(12px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
      }
      
      .glass-panel {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(16px) saturate(200%);
        -webkit-backdrop-filter: blur(16px) saturate(200%);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
      }
      
      /* Magic Dark Mode initial state setup */
      html.dark {
         filter: invert(1) hue-rotate(180deg);
      }
      html.dark body {
         background-color: white; /* Ensure base is white before invert */
      }
      
      html.dark img, 
      html.dark video, 
      html.dark iframe, 
      html.dark .notranslate,
      html.dark [data-ignore-dark="true"] {
         filter: invert(1) hue-rotate(180deg);
      }

      h1, h2, h3, h4, h5, h6 {
          font-family: "Segoe UI", sans-serif !important;
          letter-spacing: -0.01em;
      }

      /* Custom Scrollbar hide */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      
      /* Smooth Animations for Simulator */
      .slide-in-fwd-center {
        animation: slide-in-fwd-center 0.6s cubic-bezier(0.250, 0.460, 0.450, 0.940) both;
      }
      @keyframes slide-in-fwd-center {
        0% { transform: translateZ(-1400px) translateY(50px); opacity: 0; }
        100% { transform: translateZ(0) translateY(0); opacity: 1; }
      }

      .fade-in-up {
        animation: fadeInUp 0.5s ease-out forwards;
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      /* --- IOS STYLE SLIDERS (As per photo) --- */
      /* Base Style */
      input[type=range] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent; 
        margin: 10px 0;
      }
      
      input[type=range]:focus {
        outline: none;
      }

      /* The Track */
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 6px;
        cursor: pointer;
        background: #e2e8f0; /* Light grey track */
        border-radius: 99px;
      }
      
      /* The Thumb (Handle) */
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 28px; /* Bigger thumb */
        width: 28px;
        border-radius: 50%;
        background: #00a1e0; /* Caixa Blue */
        border: 4px solid #ffffff; /* White border */
        box-shadow: 0 2px 6px rgba(0,0,0,0.2); /* Soft shadow */
        cursor: pointer;
        margin-top: -11px; /* Align vertically center (28/2 - 6/2 = 11) */
        transition: transform 0.1s ease;
      }

      input[type=range]::-webkit-slider-thumb:hover {
        transform: scale(1.1);
      }
      
      /* Firefox Styles */
      input[type=range]::-moz-range-track {
        width: 100%;
        height: 6px;
        cursor: pointer;
        background: #e2e8f0;
        border-radius: 99px;
      }
      input[type=range]::-moz-range-thumb {
        height: 28px;
        width: 28px;
        border: 4px solid #ffffff;
        border-radius: 50%;
        background: #00a1e0;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      }
    </style>
